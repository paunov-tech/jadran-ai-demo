<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0,width=device-width"/>
<style>body{margin:0;padding:0;}#map{width:100%;height:100vh;}</style>
<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
</head>
<body>
<div id="map"></div>
<script>
const params = new URLSearchParams(window.location.search);
const fromLat = parseFloat(params.get("flat")||"48.2082");
const fromLon = parseFloat(params.get("flon")||"16.3738");
const toLat = parseFloat(params.get("tlat")||"43.5081");
const toLon = parseFloat(params.get("tlon")||"16.4402");

const platform = new H.service.Platform({apikey:"0baWwk3UMqKmttJIQWhv-ocxS7vOFncDkbLKb68JKxw"});
const layers = platform.createDefaultLayers();
const map = new H.Map(document.getElementById("map"), layers.vector.normal.mapnight, {
  center:{lat:(fromLat+toLat)/2,lng:(fromLon+toLon)/2}, zoom:6,
  pixelRatio:window.devicePixelRatio||1
});
window.addEventListener("resize",()=>map.getViewPort().resize());
new H.mapevents.Behavior(new H.mapevents.MapEvents(map));

const router = platform.getRoutingService(null,8);
router.calculateRoute({
  transportMode:"car",
  origin:`${fromLat},${fromLon}`,
  destination:`${toLat},${toLon}`,
  return:"polyline,summary"
}, (result)=>{
  const section = result.routes[0].sections[0];
  const linestring = H.geo.LineString.fromFlexiblePolyline(section.polyline);
  map.addObject(new H.map.Polyline(linestring,{style:{strokeColor:"#FF6600",lineWidth:4}}));
  map.addObject(new H.map.Marker({lat:fromLat,lng:fromLon}));
  map.addObject(new H.map.Marker({lat:toLat,lng:toLon}));
  map.getViewModel().setLookAtData({bounds:map.getObjects()[0].getBoundingBox()},{animate:true});
}, (err)=>console.error(err));
</script>
</body>
</html>
