<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0, width=device-width"/>
<script src="https://js.api.here.com/v3/3.2/mapsjs-core.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-service.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-mapevents.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-ui.js" type="text/javascript" charset="utf-8"></script>
<link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.2/mapsjs-ui.css"/>
<style>
  body { margin:0; padding:0; overflow:hidden; }
  #map { width:100vw; height:100vh; position:relative; }
</style>
</head>
<body>
<div id="map"></div>
<script type="text/javascript">
var p = new URLSearchParams(window.location.search);
var flat = parseFloat(p.get("flat") || "48.2082");
var flon = parseFloat(p.get("flon") || "16.3738");
var tlat = parseFloat(p.get("tlat") || "43.5081");
var tlon = parseFloat(p.get("tlon") || "16.4402");
var KEY = "0baWwk3UMqKmttJIQWhv-ocxS7vOFncDkbLKb68JKxw";

var platform = new H.service.Platform({ apikey: KEY });
var defaultLayers = platform.createDefaultLayers();

var map = new H.Map(
  document.getElementById("map"),
  defaultLayers.vector.normal.map,
  {
    center: { lat: (flat + tlat) / 2, lng: (flon + tlon) / 2 },
    zoom: 6,
    pixelRatio: window.devicePixelRatio || 1
  }
);

var behavior = new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
var ui = H.ui.UI.createDefault(map, defaultLayers);

window.addEventListener("resize", function() { map.getViewPort().resize(); });
setTimeout(function() { map.getViewPort().resize(); }, 100);

// Markers
var fromIcon = new H.map.Icon('<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#f97316" stroke="#fff" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#fff"/></svg>', {size:{w:24,h:24},anchor:{x:12,y:12}});
var toIcon = new H.map.Icon('<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#0ea5e9" stroke="#fff" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#fff"/></svg>', {size:{w:24,h:24},anchor:{x:12,y:12}});

var startMarker = new H.map.Marker({lat:flat,lng:flon},{icon:fromIcon});
var endMarker = new H.map.Marker({lat:tlat,lng:tlon},{icon:toIcon});
var group = new H.map.Group();
group.addObjects([startMarker, endMarker]);
map.addObject(group);
map.getViewModel().setLookAtData({bounds:group.getBoundingBox()},{animate:false});

// Route
var router = platform.getRoutingService8();
router.calculateRoute({
  transportMode: "car",
  routingMode: "fast",
  origin: flat + "," + flon,
  destination: tlat + "," + tlon,
  return: "polyline,summary"
}, function(result) {
  try {
    var sections = result.routes[0].sections;
    var routeGroup = new H.map.Group();
    sections.forEach(function(s) {
      var lineString = H.geo.LineString.fromFlexiblePolyline(s.polyline);
      var polyline = new H.map.Polyline(lineString, {
        style: { strokeColor: "rgba(14,165,233,0.85)", lineWidth: 5, lineCap: "round", lineJoin: "round" }
      });
      routeGroup.addObject(polyline);
    });
    map.addObject(routeGroup);
    map.getViewModel().setLookAtData({bounds: routeGroup.getBoundingBox()}, {animate: true});
  } catch(e) { console.warn("route error:", e); }
}, function(e) { console.warn("routing failed:", e); });
</script>
</body>
</html>
