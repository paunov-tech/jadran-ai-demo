<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0, width=device-width"/>
<script src="https://js.api.here.com/v3/3.2/mapsjs-core.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-service.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-mapevents.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-ui.js" type="text/javascript" charset="utf-8"></script>
<link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.2/mapsjs-ui.css"/>
<style>
  body { margin:0; padding:0; overflow:hidden; }
  #map { width:100vw; height:100vh; position:relative; }
</style>
</head>
<body>
<div id="map"></div>
<script type="text/javascript">
var p = new URLSearchParams(window.location.search);
var flat = parseFloat(p.get("flat") || "48.2082");
var flon = parseFloat(p.get("flon") || "16.3738");
var tlat = parseFloat(p.get("tlat") || "43.5081");
var tlon = parseFloat(p.get("tlon") || "16.4402");
var TMODE = p.get("tmode") || "car"; // "car" | "truck" (for campers)
// KEY is NOT in the URL — received securely via postMessage from parent

var map = null;
var markerGroup = null;
var gpsMarker = null;
var followGPS = true;
var currentRouteLine = null;
var routePoints = [];
var rerouteTimer = null;
var currentKey = null;
var OFFROUTE_M = 300; // meters before rerouting

// Haversine distance in meters
function haversineM(lat1, lon1, lat2, lon2) {
  var R = 6371000, d2r = Math.PI/180;
  var dLat = (lat2-lat1)*d2r, dLon = (lon2-lon1)*d2r;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Distance from point to nearest point on route polyline
function distToRouteM(lat, lng) {
  if (routePoints.length < 2) return Infinity;
  var minD = Infinity;
  for (var i = 0; i < routePoints.length - 1; i++) {
    var a = routePoints[i], b = routePoints[i+1];
    var dx = b.lat-a.lat, dy = b.lng-a.lng, lenSq = dx*dx+dy*dy;
    var t = lenSq > 0 ? Math.max(0, Math.min(1, ((lat-a.lat)*dx+(lng-a.lng)*dy)/lenSq)) : 0;
    var d = haversineM(lat, lng, a.lat+t*dx, a.lng+t*dy);
    if (d < minD) minD = d;
  }
  return minD;
}

// Draw (or replace) route from sections array
function drawRoute(sections) {
  if (currentRouteLine) { try { map.removeObject(currentRouteLine); } catch(e){} currentRouteLine = null; }
  routePoints = [];
  var lines = sections.map(function(s) { return H.geo.LineString.fromFlexiblePolyline(s.polyline); });
  lines.forEach(function(ls) {
    for (var i = 0, n = ls.getPointCount(); i < n; i++) {
      var pt = ls.extractPoint(i); routePoints.push({lat:pt.lat, lng:pt.lng});
    }
  });
  currentRouteLine = new H.map.Polyline(new H.geo.MultiLineString(lines), {
    style: {strokeColor:"rgba(14,165,233,0.85)", lineWidth:5, lineCap:"round", lineJoin:"round"}
  });
  map.addObject(currentRouteLine);
  return currentRouteLine;
}

// Fetch route from (oLat, oLon) to fixed destination
function fetchRoute(oLat, oLon) {
  if (!currentKey) return;
  fetch("https://router.hereapi.com/v8/routes?transportMode=" + TMODE + "&routingMode=fast"
    + "&origin=" + oLat + "," + oLon + "&destination=" + tlat + "," + tlon
    + "&return=polyline,summary&apikey=" + currentKey)
    .then(function(r) { if (!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(data) {
      if (!data.routes || !data.routes[0]) return;
      drawRoute(data.routes[0].sections);
    })
    .catch(function() {});
}

var gpsIcon = new H.map.Icon('<svg width="28" height="28" xmlns="http://www.w3.org/2000/svg"><circle cx="14" cy="14" r="12" fill="rgba(59,130,246,0.15)" stroke="none"><animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle><circle cx="14" cy="14" r="6" fill="#3b82f6" stroke="#fff" stroke-width="2"/></svg>', {size:{w:28,h:28},anchor:{x:14,y:14}});

function showRouteError(msg) {
  var el = document.createElement("div");
  el.style.cssText = "position:absolute;top:8px;left:50%;transform:translateX(-50%);padding:6px 14px;background:rgba(10,22,40,0.85);color:#94a3b8;font-size:12px;font-family:sans-serif;border-radius:8px;border:1px solid rgba(14,165,233,0.15);pointer-events:none;z-index:9;white-space:nowrap;";
  el.textContent = msg;
  document.getElementById("map").appendChild(el);
}

function initMap(KEY) {
  currentKey = KEY;
  var platform = new H.service.Platform({ apikey: KEY });
  var defaultLayers = platform.createDefaultLayers();

  map = new H.Map(
    document.getElementById("map"),
    defaultLayers.vector.normal.map,
    {
      center: { lat: (flat + tlat) / 2, lng: (flon + tlon) / 2 },
      zoom: 6,
      pixelRatio: window.devicePixelRatio || 1
    }
  );

  new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
  H.ui.UI.createDefault(map, defaultLayers);
  window.addEventListener("resize", function() { map.getViewPort().resize(); });
  setTimeout(function() { map.getViewPort().resize(); }, 100);

  // Markers
  var fromIcon = new H.map.Icon('<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#f97316" stroke="#fff" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#fff"/></svg>', {size:{w:24,h:24},anchor:{x:12,y:12}});
  var toIcon = new H.map.Icon('<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#0ea5e9" stroke="#fff" stroke-width="2.5"/><circle cx="12" cy="12" r="3" fill="#fff"/></svg>', {size:{w:24,h:24},anchor:{x:12,y:12}});
  var startMarker = new H.map.Marker({lat:flat,lng:flon},{icon:fromIcon});
  var endMarker = new H.map.Marker({lat:tlat,lng:tlon},{icon:toIcon});

  markerGroup = new H.map.Group();
  markerGroup.addObjects([startMarker, endMarker]);
  map.addObject(markerGroup);
  map.getViewModel().setLookAtData({bounds: markerGroup.getBoundingBox()},{animate:false});

  // Route via REST API — SDK decodes flexible polyline natively
  var routeUrl = "https://router.hereapi.com/v8/routes"
    + "?transportMode=" + TMODE + "&routingMode=fast"
    + "&origin=" + flat + "," + flon
    + "&destination=" + tlat + "," + tlon
    + "&return=polyline,summary"
    + "&apikey=" + KEY;

  fetch(routeUrl)
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data.routes || !data.routes[0]) { showRouteError("Ruta nije dostupna"); return; }
      var rl = drawRoute(data.routes[0].sections);
      var bb = rl.getBoundingBox();
      var mb = markerGroup.getBoundingBox();
      if (bb && mb) bb = bb.mergeRect(mb);
      map.getViewModel().setLookAtData({bounds: bb || mb}, {animate: true});
    })
    .catch(function() {
      showRouteError("Ruta — provjeri internet vezu");
    });

  // Stop auto-follow when user drags map
  map.addEventListener("dragstart", function() { followGPS = false; });
  // Resume follow on double-tap
  map.addEventListener("dbltap", function() { followGPS = true; });
}

// ── Message router: map_init (key) + gps_update ──
window.addEventListener("message", function(e) {
  if (!e.data) return;

  if (e.data.type === "map_init") {
    if (e.data.key) initMap(e.data.key);
    return;
  }

  if (e.data.type === "gps_update") {
    if (!map) return;
    var lat = e.data.lat, lng = e.data.lng;
    if (!lat || !lng) return;
    if (!gpsMarker) {
      gpsMarker = new H.map.Marker({lat: lat, lng: lng}, {icon: gpsIcon, zIndex: 100});
      map.addObject(gpsMarker);
    } else {
      gpsMarker.setGeometry({lat: lat, lng: lng});
    }
    if (followGPS) {
      map.getViewModel().setLookAtData({position: {lat: lat, lng: lng}, zoom: Math.max(map.getZoom(), 9)}, {animate: true});
    }
    // Off-route detection — reroute if >300m from route (5s debounce)
    if (routePoints.length && !rerouteTimer) {
      if (distToRouteM(lat, lng) > OFFROUTE_M) {
        var capLat = lat, capLng = lng;
        rerouteTimer = setTimeout(function() {
          rerouteTimer = null;
          if (gpsMarker && distToRouteM(capLat, capLng) > OFFROUTE_M) {
            fetchRoute(capLat, capLng);
          }
        }, 5000);
      }
    }
  }
});
</script>
</body>
</html>
