<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0,width=device-width"/>
<style>body{margin:0;padding:0;}#map{width:100%;height:100vh;}</style>
<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
</head>
<body>
<div id="map"></div>
<script>
const p = new URLSearchParams(window.location.search);
const flat = parseFloat(p.get("flat")||"48.2082");
const flon = parseFloat(p.get("flon")||"16.3738");
const tlat = parseFloat(p.get("tlat")||"43.5081");
const tlon = parseFloat(p.get("tlon")||"16.4402");

const platform = new H.service.Platform({apikey:"0baWwk3UMqKmttJIQWhv-ocxS7vOFncDkbLKb68JKxw"});
const layers = platform.createDefaultLayers();
const map = new H.Map(document.getElementById("map"), layers.vector.normal.mapnight, {
  center:{lat:(flat+tlat)/2, lng:(flon+tlon)/2}, zoom:6,
  pixelRatio: window.devicePixelRatio||1
});
window.addEventListener("resize", ()=>map.getViewPort().resize());
new H.mapevents.Behavior(new H.mapevents.MapEvents(map));

// Add markers immediately — no routing dependency
const startMarker = new H.map.Marker({lat:flat, lng:flon});
const endMarker = new H.map.Marker({lat:tlat, lng:tlon});
map.addObjects([startMarker, endMarker]);

// Fit to markers
const group = new H.map.Group();
group.addObjects([startMarker, endMarker]);
map.getViewModel().setLookAtData({bounds: group.getBoundingBox()});

// Try routing separately — if fails, markers still show
const router = platform.getRoutingService(null, 8);
router.calculateRoute({
  routingMode: "fast",
  transportMode: "car",
  origin: flat+","+flon,
  destination: tlat+","+tlon,
  return: "polyline"
}, function(result) {
  try {
    const sections = result.routes[0].sections;
    const lineStrings = sections.map(s => H.geo.LineString.fromFlexiblePolyline(s.polyline));
    const multiLine = new H.geo.MultiLineString(lineStrings);
    const routeLine = new H.map.Polyline(multiLine, {style:{strokeColor:"#FF6600",lineWidth:4}});
    map.addObject(routeLine);
    const routeGroup = new H.map.Group();
    routeGroup.addObjects([routeLine, startMarker, endMarker]);
    map.getViewModel().setLookAtData({bounds: routeGroup.getBoundingBox()});
  } catch(e) { console.log("Route draw error:", e); }
}, function(err) {
  console.log("Routing failed, showing markers only:", err);
});
</script>
</body>
</html>
