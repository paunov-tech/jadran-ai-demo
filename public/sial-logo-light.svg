<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none" role="img" aria-label="SIAL Technology Consulting">
  <defs>
    <linearGradient id="slg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="slg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal frame -->
  <path d="M24 8 L50 8 L63 30 L50 52 L24 52 L11 30 Z"
        fill="url(#slg)" fill-opacity="0.12"
        stroke="url(#slg)" stroke-width="1.4"/>

  <!-- Circuit S trace -->
  <path d="M22 18 Q22 12 29 12 L43 12 Q50 12 50 19 Q50 26 37 26"
        stroke="url(#slg)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M37 26 Q24 26 24 33 Q24 40 31 40 L45 40 Q52 40 52 47"
        stroke="url(#slg2)" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- Circuit nodes -->
  <circle cx="22" cy="18" r="3.5" fill="#38bdf8"/>
  <circle cx="52" cy="47" r="3.5" fill="#7dd3fc"/>
  <circle cx="37" cy="26" r="2.2" fill="#bae6fd" opacity="0.8"/>

  <!-- PCB ticks -->
  <line x1="11" y1="30" x2="6" y2="30" stroke="#38bdf8" stroke-width="1.2" opacity="0.4"/>
  <line x1="63" y1="30" x2="68" y2="30" stroke="#38bdf8" stroke-width="1.2" opacity="0.4"/>

  <!-- Vertical rule -->
  <line x1="82" y1="12" x2="82" y2="58" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>

  <!-- SIAL wordmark — white on dark -->
  <text x="96" y="42"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="800" fill="#f0f9ff" letter-spacing="5">SIAL</text>

  <!-- Tagline rule -->
  <line x1="96" y1="50" x2="352" y2="50" stroke="rgba(255,255,255,0.1)" stroke-width="0.6"/>

  <!-- Tagline -->
  <text x="97" y="63"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" fill="#94a3b8" letter-spacing="4">TECHNOLOGY CONSULTING</text>
</svg>
