<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0, width=device-width"/>
<script src="https://js.api.here.com/v3/3.2/mapsjs-core.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-service.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-mapevents.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-ui.js" type="text/javascript" charset="utf-8"></script>
<link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.2/mapsjs-ui.css"/>
<style>
  body { margin:0; padding:0; overflow:hidden; background:#0a1628; }
  #map { width:100vw; height:100vh; }
  #legend {
    position:absolute; bottom:24px; left:16px;
    background:rgba(10,22,40,0.88); border:1px solid rgba(14,165,233,0.18);
    border-radius:12px; padding:10px 14px; font-family:system-ui,sans-serif;
    font-size:11px; color:#94a3b8; pointer-events:none; z-index:9;
    backdrop-filter:blur(8px);
  }
  #legend .lt { font-size:10px; color:#64748b; margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
  #legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend .dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  #status {
    position:absolute; top:10px; right:10px;
    background:rgba(10,22,40,0.82); border:1px solid rgba(14,165,233,0.15);
    border-radius:8px; padding:5px 12px; font-family:system-ui,sans-serif;
    font-size:11px; color:#64748b; pointer-events:none; z-index:9;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <div class="lt">DELTA — Gustoća turista</div>
  <div class="row"><div class="dot" style="background:#ef4444;opacity:.8"></div> Kritično</div>
  <div class="row"><div class="dot" style="background:#f97316;opacity:.8"></div> Jako gusto</div>
  <div class="row"><div class="dot" style="background:#eab308;opacity:.8"></div> Umjereno</div>
  <div class="row"><div class="dot" style="background:#22c55e;opacity:.8"></div> Malo</div>
  <div style="margin-top:8px" class="lt">Parking · More · Affiliate</div>
  <div class="row"><div class="dot" style="background:#a855f7;opacity:.8"></div> Parking (Sentinel-2)</div>
  <div class="row"><div class="dot" style="background:#0ea5e9;opacity:.8"></div> Kvalitet mora</div>
  <div class="row"><div class="dot" style="background:#f59e0b;border:2px solid #fff;opacity:.9"></div> Affiliate partner</div>
</div>
<div id="status">Inicijalizacija...</div>

<script type="text/javascript">
var map = null;
var currentKey = null;
var overlayGroup = null;

// Level → circle fill/stroke
var LEVEL_COLORS = {
  critical: { fill:"rgba(239,68,68,0.30)",   stroke:"#ef4444" },
  heavy:    { fill:"rgba(249,115,22,0.25)",   stroke:"#f97316" },
  moderate: { fill:"rgba(234,179,8,0.22)",    stroke:"#eab308" },
  light:    { fill:"rgba(34,197,94,0.18)",    stroke:"#22c55e" },
  empty:    { fill:"rgba(100,116,139,0.10)",  stroke:"#475569" },
  unknown:  { fill:"rgba(100,116,139,0.08)",  stroke:"#334155" },
};

// Sea clarity → color
var SEA_COLORS = {
  excellent: "#0ea5e9",
  good:      "#38bdf8",
  fair:      "#7dd3fc",
  poor:      "#fb923c",
  bad:       "#ef4444",
  unknown:   "#475569",
};

// Parking occupancy → color
function parkingColor(level) {
  return { full:"#ef4444", heavy:"#f97316", moderate:"#eab308", light:"#22c55e", empty:"#475569", unknown:"#334155" }[level] || "#334155";
}

function initMap(KEY) {
  currentKey = KEY;
  var platform = new H.service.Platform({ apikey: KEY });
  var defaultLayers = platform.createDefaultLayers();

  map = new H.Map(
    document.getElementById("map"),
    defaultLayers.vector.normal.map,
    {
      center: { lat: 44.2, lng: 15.8 },
      zoom: 7,
      pixelRatio: window.devicePixelRatio || 1
    }
  );
  // Dark satellite-like base
  map.setBaseLayer(defaultLayers.vector.normal.map);

  new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
  H.ui.UI.createDefault(map, defaultLayers);
  window.addEventListener("resize", function() { map.getViewPort().resize(); });
  setTimeout(function() { map.getViewPort().resize(); }, 100);

  overlayGroup = new H.map.Group();
  map.addObject(overlayGroup);

  document.getElementById("status").textContent = "Čeka podatke...";
}

function svgAffiliatePin(color) {
  return '<svg width="32" height="40" xmlns="http://www.w3.org/2000/svg">'
    + '<path d="M16 2 C9.4 2 4 7.4 4 14 C4 22 16 38 16 38 C16 38 28 22 28 14 C28 7.4 22.6 2 16 2Z" fill="' + color + '" stroke="#fff" stroke-width="2"/>'
    + '<text x="16" y="19" text-anchor="middle" font-size="13" fill="#fff" font-family="system-ui">★</text>'
    + '</svg>';
}

function svgParkingPin(color) {
  return '<svg width="22" height="22" xmlns="http://www.w3.org/2000/svg">'
    + '<rect x="1" y="1" width="20" height="20" rx="5" fill="' + color + '" stroke="#fff" stroke-width="1.5"/>'
    + '<text x="11" y="15.5" text-anchor="middle" font-size="11" fill="#fff" font-family="system-ui" font-weight="bold">P</text>'
    + '</svg>';
}

function drawData(data) {
  if (!map || !overlayGroup) return;
  overlayGroup.removeAll();

  // ── YOLO Region density circles ──────────────────────────────
  (data.regions || []).forEach(function(r) {
    if (!r.lat || !r.lng) return;
    var c = LEVEL_COLORS[r.level] || LEVEL_COLORS.empty;
    // Radius scales with object count: 8km base, up to 35km
    var radiusM = Math.max(8000, Math.min(35000, 8000 + r.objects * 80));
    var circle = new H.map.Circle(
      { lat: r.lat, lng: r.lng },
      radiusM,
      { style: { fillColor: c.fill, strokeColor: c.stroke, lineWidth: 2 } }
    );
    circle.setData({ type: "region", id: r.id, name: r.name, objects: r.objects, cars: r.cars, persons: r.persons, level: r.level });

    // Label via DomIcon
    var labelDiv = document.createElement("div");
    labelDiv.style.cssText = "font-family:system-ui,sans-serif;font-size:11px;color:#f0f9ff;background:rgba(10,22,40,0.75);padding:3px 7px;border-radius:6px;border:1px solid rgba(14,165,233,0.25);white-space:nowrap;pointer-events:none;";
    labelDiv.innerHTML = "<b>" + r.name + "</b><br><span style='color:#94a3b8'>" + r.objects + " detekcija</span>";
    var labelIcon  = new H.map.DomIcon(labelDiv, { anchor: { x: 0, y: 0 } });
    var labelMarker = new H.map.DomMarker({ lat: r.lat, lng: r.lng }, { icon: labelIcon, zIndex: 10 });

    overlayGroup.addObjects([circle, labelMarker]);
  });

  // ── Parking markers ───────────────────────────────────────────
  (data.parking || []).forEach(function(p) {
    if (!p.lat || !p.lng) return;
    var color = parkingColor(p.level);
    var svgStr = svgParkingPin(color);
    var icon = new H.map.Icon(svgStr, { size: { w: 22, h: 22 }, anchor: { x: 11, y: 11 } });
    var marker = new H.map.Marker({ lat: p.lat, lng: p.lng }, { icon: icon, zIndex: 15 });
    marker.setData({ type: "parking", name: p.name, occupancyPct: p.occupancyPct, level: p.level, maxCars: p.maxCars });
    overlayGroup.addObject(marker);
  });

  // ── Sea quality circles ───────────────────────────────────────
  (data.sea || []).forEach(function(s) {
    if (!s.lat || !s.lng) return;
    var color = SEA_COLORS[s.clarity] || SEA_COLORS.unknown;
    var circle = new H.map.Circle(
      { lat: s.lat, lng: s.lng },
      4000,
      { style: { fillColor: color.replace(")", ",0.20)").replace("rgb", "rgba"), strokeColor: color, lineWidth: 1.5 } }
    );
    circle.setData({ type: "sea", name: s.beach, clarity: s.clarity, clarityHR: s.clarityHR, algaeRisk: s.algaeRisk });
    overlayGroup.addObject(circle);
  });

  // ── Affiliate pins ────────────────────────────────────────────
  (data.affiliates || []).forEach(function(a) {
    if (!a.lat || !a.lng) return;
    var svgStr = svgAffiliatePin(a.color || "#f59e0b");
    var icon   = new H.map.Icon(svgStr, { size: { w: 32, h: 40 }, anchor: { x: 16, y: 38 } });
    var marker = new H.map.Marker({ lat: a.lat, lng: a.lng }, { icon: icon, zIndex: 20 });
    marker.setData({ type: "affiliate", name: a.name, city: a.city });
    overlayGroup.addObject(marker);

    // Affiliate label
    var lDiv = document.createElement("div");
    lDiv.style.cssText = "font-family:system-ui;font-size:10px;color:#fbbf24;background:rgba(10,22,40,0.82);padding:2px 6px;border-radius:5px;border:1px solid rgba(245,158,11,0.3);white-space:nowrap;pointer-events:none;margin-top:42px;margin-left:-20px;";
    lDiv.textContent = a.name.split("—")[0].trim();
    var lIcon   = new H.map.DomIcon(lDiv);
    var lMarker = new H.map.DomMarker({ lat: a.lat, lng: a.lng }, { icon: lIcon, zIndex: 19 });
    overlayGroup.addObject(lMarker);
  });

  // Add tap info bubble
  map.addEventListener("tap", function(e) {
    var target = e.target;
    if (target instanceof H.map.AbstractMarker || target instanceof H.map.Circle) {
      var d = target.getData();
      if (!d) return;
      var txt = "";
      if (d.type === "region")    txt = d.name + "\n" + d.objects + " detekcija (" + d.cars + " vozila, " + d.persons + " osoba)\nRazina: " + d.level;
      if (d.type === "parking")   txt = d.name + "\nZauzetost: " + (d.occupancyPct != null ? d.occupancyPct + "%" : "n/a") + " — " + d.level + "\nMax: " + d.maxCars + " vozila (Sentinel-2)";
      if (d.type === "sea")       txt = d.beach + "\nMore: " + d.clarityHR + (d.algaeRisk !== "none" ? "\nAlge: " + d.algaeRisk : "");
      if (d.type === "affiliate") txt = d.name + "\n" + d.city + " — affiliate partner";
      if (txt) {
        var bubble = new H.ui.InfoBubble(target.getGeometry ? target.getGeometry() : e.target.getPosition(), {
          content: "<div style='font-family:system-ui;font-size:12px;white-space:pre-line;color:#0f172a'>" + txt + "</div>"
        });
        map.getObjects(H.map.AbstractMarker).forEach(function(){});
        // Remove previous bubbles
        var ui = H.ui.UI.getInstance(map);
        if (ui) {
          ui.getBubbles().forEach(function(b) { ui.removeBubble(b); });
          ui.addBubble(bubble);
        }
      }
    }
  });

  // Status update
  var ts = data.ts ? new Date(data.ts).toLocaleTimeString("hr-HR", { hour: "2-digit", minute: "2-digit" }) : "";
  var totalObj = (data.yolo && data.yolo.total) || 0;
  document.getElementById("status").textContent = "DELTA " + ts + " · " + totalObj + " detekcija";
}

// ── postMessage router ────────────────────────────────────────────────────────
window.addEventListener("message", function(e) {
  if (!e.data) return;

  if (e.data.type === "coast_init") {
    if (e.data.key && !map) initMap(e.data.key);
    if (e.data.data && map) setTimeout(function() { drawData(e.data.data); }, 300);
    return;
  }

  if (e.data.type === "coast_data") {
    if (!map && e.data.key) initMap(e.data.key);
    if (map && e.data.data) drawData(e.data.data);
    return;
  }
});
</script>
</body>
</html>
