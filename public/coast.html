<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1.0, width=device-width"/>
<script src="https://js.api.here.com/v3/3.2/mapsjs-core.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-service.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-mapevents.js" type="text/javascript" charset="utf-8"></script>
<script src="https://js.api.here.com/v3/3.2/mapsjs-ui.js" type="text/javascript" charset="utf-8"></script>
<link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.2/mapsjs-ui.css"/>
<style>
  body { margin:0; padding:0; overflow:hidden; }
  #map { width:100vw; height:100vh; }
  #legend {
    position:absolute; bottom:20px; left:14px;
    background:rgba(6,15,30,0.88); border:1px solid rgba(14,165,233,0.22);
    border-radius:12px; padding:10px 14px; font-family:system-ui,sans-serif;
    font-size:11px; color:#94a3b8; pointer-events:none; z-index:9;
  }
  #legend .lt  { font-size:10px; color:#475569; margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
  #legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
  #legend .dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  #status {
    position:absolute; top:10px; right:10px;
    background:rgba(6,15,30,0.82); border:1px solid rgba(14,165,233,0.18);
    border-radius:8px; padding:5px 12px; font-family:system-ui,sans-serif;
    font-size:11px; color:#64748b; pointer-events:none; z-index:9;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <div class="lt">Gustoća turista (YOLO)</div>
  <div class="row"><div class="dot" style="background:#ef4444"></div> Kritično (&gt;200)</div>
  <div class="row"><div class="dot" style="background:#f97316"></div> Jako gusto (&gt;100)</div>
  <div class="row"><div class="dot" style="background:#eab308"></div> Umjereno (&gt;50)</div>
  <div class="row"><div class="dot" style="background:#22c55e"></div> Malo (&gt;10)</div>
  <div class="row"><div class="dot" style="background:#6366f1;opacity:.7"></div> Zona praćenja</div>
  <div style="margin-top:8px" class="lt">Parking · More · Partneri</div>
  <div class="row"><div class="dot" style="background:#a855f7"></div> Parking (Sentinel-2)</div>
  <div class="row"><div class="dot" style="background:#0ea5e9"></div> Kvalitet mora</div>
  <div class="row"><div class="dot" style="background:#f59e0b"></div> Affiliate</div>
  <div style="margin-top:8px" class="lt">Real-time</div>
  <div class="row"><div class="dot" style="background:#ef4444"></div> NASA požar (visoko)</div>
  <div class="row"><div class="dot" style="background:#f97316"></div> NASA požar (nominal)</div>
  <div class="row"><div class="dot" style="background:#22d3ee;border-radius:3px"></div> Windy webcam</div>
</div>
<div id="status">Inicijalizacija...</div>

<script type="text/javascript">
// ── Globals ───────────────────────────────────────────────────────────────────
var map = null;
var mapUI = null;
var overlayGroup = null;

// Level → circle style  (H.map.Circle uses CSS rgba)
var LEVEL_STYLE = {
  critical: { f: "rgba(239,68,68,0.45)",   s: "rgba(239,68,68,1)",   lw: 3 },
  heavy:    { f: "rgba(249,115,22,0.40)",  s: "rgba(249,115,22,1)",  lw: 2.5 },
  moderate: { f: "rgba(234,179,8,0.38)",   s: "rgba(234,179,8,1)",   lw: 2 },
  light:    { f: "rgba(34,197,94,0.32)",   s: "rgba(34,197,94,1)",   lw: 2 },
  empty:    { f: "rgba(99,102,241,0.18)",  s: "rgba(99,102,241,0.8)",lw: 1.5 },
};
var SEA_STYLE = {
  excellent: { f:"rgba(14,165,233,0.38)",  s:"rgba(14,165,233,0.9)" },
  good:      { f:"rgba(56,189,248,0.32)",  s:"rgba(56,189,248,0.85)" },
  fair:      { f:"rgba(234,179,8,0.32)",   s:"rgba(234,179,8,0.85)" },
  poor:      { f:"rgba(249,115,22,0.38)",  s:"rgba(249,115,22,0.9)" },
  bad:       { f:"rgba(239,68,68,0.42)",   s:"rgba(239,68,68,0.95)" },
  unknown:   { f:"rgba(71,85,105,0.10)",   s:"rgba(71,85,105,0.4)" },
};
var PARK_STYLE = {
  full:     { f:"rgba(239,68,68,0.50)",    s:"rgba(239,68,68,1)" },
  heavy:    { f:"rgba(249,115,22,0.45)",   s:"rgba(249,115,22,1)" },
  moderate: { f:"rgba(168,85,247,0.38)",   s:"rgba(168,85,247,0.9)" },
  light:    { f:"rgba(168,85,247,0.25)",   s:"rgba(168,85,247,0.7)" },
  empty:    { f:"rgba(168,85,247,0.12)",   s:"rgba(168,85,247,0.45)" },
  unknown:  { f:"rgba(71,85,105,0.08)",    s:"rgba(71,85,105,0.3)" },
};

function webcamSvg() {
  return '<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg">'
    + '<circle cx="12" cy="12" r="11" fill="rgba(6,15,30,0.92)" stroke="#22d3ee" stroke-width="1.5"/>'
    + '<rect x="4" y="8" width="11" height="8" rx="1.5" fill="none" stroke="#22d3ee" stroke-width="1.3"/>'
    + '<polygon points="15,9.5 20,7.5 20,16.5 15,14.5" fill="#22d3ee"/>'
    + '<circle cx="9.5" cy="12" r="2" fill="#22d3ee" opacity="0.75"/>'
    + '</svg>';
}

function affiliatePin(color) {
  return '<svg width="34" height="44" xmlns="http://www.w3.org/2000/svg">'
    + '<path d="M17 2C9.8 2 4 7.8 4 15c0 9 13 27 13 27s13-18 13-27C30 7.8 24.2 2 17 2Z"'
    + ' fill="' + color + '" stroke="#fff" stroke-width="2.5"/>'
    + '<text x="17" y="20" text-anchor="middle" font-size="14" fill="#fff" font-family="system-ui,sans-serif">&#9733;</text>'
    + '</svg>';
}

// ── Map init ─────────────────────────────────────────────────────────────────
// Mirrors map.html initMap — proven pattern
function initMap(KEY) {
  try {
    var platform = new H.service.Platform({ apikey: KEY });
    var defaultLayers = platform.createDefaultLayers();

    map = new H.Map(
      document.getElementById("map"),
      defaultLayers.vector.normal.map,
      { center: { lat: 44.2, lng: 15.8 }, zoom: 7, pixelRatio: window.devicePixelRatio || 1 }
    );

    new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
    mapUI = H.ui.UI.createDefault(map, defaultLayers); // store reference for bubbles

    window.addEventListener("resize", function() { map.getViewPort().resize(); });
    setTimeout(function() { map.getViewPort().resize(); }, 100);

    overlayGroup = new H.map.Group();
    map.addObject(overlayGroup);

    // Tap → info bubble
    map.addEventListener("tap", function(e) {
      var obj = e.target;
      var d   = (obj && obj.getData) ? obj.getData() : null;
      if (!d || !mapUI) return;
      var lvlHR = { critical:"KRITIČNO", heavy:"jako gusto", moderate:"umjereno", light:"malo", empty:"zona praćenja", full:"PUNO", unknown:"—" };
      var html  = "";
      if (d.type === "region")
        html = "<b>" + d.name + "</b><br>" + d.objects + " detekcija (" + d.cars + " vozila, " + d.persons + " osoba)<br>Razina: " + (lvlHR[d.level] || d.level);
      else if (d.type === "parking")
        html = "<b>" + d.name + "</b><br>Zauzetost: " + (d.pct != null ? d.pct + "%" : "n/a") + " — " + (lvlHR[d.level] || d.level) + "<br>Max: " + d.max + " vozila";
      else if (d.type === "sea")
        html = "<b>" + d.beach + "</b><br>More: " + d.clarityHR + (d.algaeRisk && d.algaeRisk !== "none" ? "<br>Alge: " + d.algaeRisk : "");
      else if (d.type === "affiliate")
        html = "<b>" + d.name + "</b><br>" + d.city + " — affiliate";
      else if (d.type === "webcam")
        html = "<b>" + d.title + "</b><br>" + d.city + "<br><a href='" + d.url + "' target='_blank' style='color:#22d3ee;font-size:11px'>Otvori webcam ↗</a>";
      else if (d.type === "fire")
        html = "<b>Požarni hotspot</b><br>Povjerenje: " + d.confidence + "<br>Datum: " + d.acqDate + (d.dayNight === "N" ? "<br>(noćno snimanje)" : "");
      if (html) {
        mapUI.getBubbles().forEach(function(b) { mapUI.removeBubble(b); });
        var pos = obj.getPosition ? obj.getPosition() : (obj.getBoundingBox ? obj.getBoundingBox().getCenter() : null);
        if (pos) mapUI.addBubble(new H.ui.InfoBubble(pos, { content: "<div style='font-size:12px;line-height:1.5;min-width:160px'>" + html + "</div>" }));
      }
    });

    document.getElementById("status").textContent = "Čeka podatke...";
  } catch(err) {
    console.error("coast.html initMap error:", err);
    document.getElementById("status").textContent = "Map error: " + err.message;
  }
}

// ── Draw all overlays ─────────────────────────────────────────────────────────
function drawData(data) {
  if (!map || !overlayGroup) return;
  try {
    overlayGroup.removeAll();

    // ── YOLO region density (H.map.Circle) ────────────────────────
    (data.regions || []).forEach(function(r) {
      if (!r.lat || !r.lng) return;
      var st  = LEVEL_STYLE[r.level] || LEVEL_STYLE.empty;
      // 28km minimum radius, scale with detections
      var rad = Math.max(28000, Math.min(65000, 28000 + r.objects * 180));
      try {
        var circ = new H.map.Circle(
          { lat: r.lat, lng: r.lng }, rad,
          { style: { fillColor: st.f, strokeColor: st.s, lineWidth: st.lw } }
        );
        circ.setData({ type:"region", name:r.name, objects:r.objects, cars:r.cars, persons:r.persons, level:r.level });
        overlayGroup.addObject(circ);
      } catch(e) { console.warn("circle region", r.id, e.message); }

      // Label
      var countColor = { critical:"#fca5a5", heavy:"#fdba74", moderate:"#fde68a", light:"#86efac", empty:"#a5b4fc" }[r.level] || "#94a3b8";
      var lDiv = document.createElement("div");
      lDiv.style.cssText = "pointer-events:none;font-family:system-ui,sans-serif;";
      lDiv.innerHTML = '<div style="background:rgba(6,15,30,0.82);border:1px solid ' + st.s + ';border-radius:6px;padding:3px 8px;white-space:nowrap;">'
        + '<span style="font-size:11px;font-weight:700;color:#f0f9ff">' + r.name + '</span>'
        + '<br><span style="font-size:10px;color:' + countColor + '">' + r.objects + ' det</span></div>';
      overlayGroup.addObject(new H.map.DomMarker({ lat: r.lat, lng: r.lng }, { icon: new H.map.DomIcon(lDiv), zIndex: 15 }));
    });

    // ── Sea quality circles ────────────────────────────────────────
    (data.sea || []).forEach(function(s) {
      if (!s.lat || !s.lng || s.clarity === "unknown") return;
      var st = SEA_STYLE[s.clarity] || SEA_STYLE.unknown;
      try {
        var circ = new H.map.Circle(
          { lat: s.lat, lng: s.lng }, 7000,
          { style: { fillColor: st.f, strokeColor: st.s, lineWidth: 1.5 } }
        );
        circ.setData({ type:"sea", beach: s.beach || s.name, clarityHR: s.clarityHR || s.clarity, algaeRisk: s.algaeRisk });
        overlayGroup.addObject(circ);
      } catch(e) { console.warn("circle sea", s.id, e.message); }
    });

    // ── Parking circles ────────────────────────────────────────────
    (data.parking || []).forEach(function(p) {
      if (!p.lat || !p.lng || p.level === "unknown") return;
      var st = PARK_STYLE[p.level] || PARK_STYLE.unknown;
      try {
        var circ = new H.map.Circle(
          { lat: p.lat, lng: p.lng }, 5000,
          { style: { fillColor: st.f, strokeColor: st.s, lineWidth: 1.5 } }
        );
        circ.setData({ type:"parking", name: p.name, pct: p.occupancyPct, level: p.level, max: p.maxCars });
        overlayGroup.addObject(circ);
      } catch(e) { console.warn("circle parking", p.id, e.message); }

      // P label
      var pDiv = document.createElement("div");
      pDiv.style.cssText = "background:" + st.s + ";color:#fff;font-size:10px;font-weight:700;font-family:system-ui;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;pointer-events:none;border:1px solid rgba(255,255,255,0.35);";
      pDiv.textContent = "P";
      overlayGroup.addObject(new H.map.DomMarker({ lat: p.lat, lng: p.lng }, { icon: new H.map.DomIcon(pDiv, { anchor:{x:9,y:9} }), zIndex: 20 }));
    });

    // ── NASA FIRMS fire hotspots ───────────────────────────────────
    (data.fires || []).forEach(function(f) {
      if (!f.lat || !f.lng) return;
      var isHigh = f.confidence === "high";
      var fillC  = isHigh ? "rgba(239,68,68,0.55)"  : "rgba(249,115,22,0.38)";
      var strkC  = isHigh ? "rgba(239,68,68,1)"      : "rgba(249,115,22,0.9)";
      try {
        var circ = new H.map.Circle(
          { lat: f.lat, lng: f.lng }, 2500,
          { style: { fillColor: fillC, strokeColor: strkC, lineWidth: 1.5 } }
        );
        circ.setData({ type: "fire", confidence: f.confidence, acqDate: f.acqDate, dayNight: f.dayNight });
        overlayGroup.addObject(circ);
      } catch(e) { console.warn("fire circle", e.message); }
    });

    // ── Windy webcam markers ───────────────────────────────────────
    (data.webcams || []).forEach(function(w) {
      if (!w.lat || !w.lng) return;
      try {
        var icon   = new H.map.Icon(webcamSvg(), { size: { w:24, h:24 }, anchor: { x:12, y:12 } });
        var marker = new H.map.Marker({ lat: w.lat, lng: w.lng }, { icon: icon, zIndex: 28 });
        marker.setData({ type: "webcam", title: w.title, city: w.city, url: w.url });
        overlayGroup.addObject(marker);
      } catch(e) { console.warn("webcam marker", w.id, e.message); }
    });

    // ── Affiliate pins ─────────────────────────────────────────────
    (data.affiliates || []).forEach(function(a) {
      if (!a.lat || !a.lng) return;
      var color = a.color || "#f59e0b";
      try {
        var icon   = new H.map.Icon(affiliatePin(color), { size:{w:34,h:44}, anchor:{x:17,y:42} });
        var marker = new H.map.Marker({ lat: a.lat, lng: a.lng }, { icon: icon, zIndex: 25 });
        marker.setData({ type:"affiliate", name: a.name, city: a.city });
        overlayGroup.addObject(marker);
      } catch(e) { console.warn("affiliate marker", a.id, e.message); }

      // Affiliate label
      var aDiv = document.createElement("div");
      aDiv.style.cssText = "font-family:system-ui;font-size:10px;font-weight:600;color:" + color + ";background:rgba(6,15,30,0.85);padding:2px 7px;border-radius:5px;border:1px solid " + color.replace(")", ",0.3)").replace("rgb(","rgba(") + ";white-space:nowrap;pointer-events:none;";
      aDiv.textContent = (a.name || "").split("—")[0].trim();
      overlayGroup.addObject(new H.map.DomMarker({ lat: a.lat - 0.05, lng: a.lng }, { icon: new H.map.DomIcon(aDiv), zIndex: 24 }));
    });

    // Status
    var ts    = data.ts ? new Date(data.ts).toLocaleTimeString("hr-HR", { hour:"2-digit", minute:"2-digit" }) : "";
    var total = (data.yolo && data.yolo.total) || 0;
    var ac    = (data.yolo && data.yolo.active) || 0;
    document.getElementById("status").textContent = "DELTA " + ts + " · " + total + " det · " + ac + " senzora";
  } catch(err) {
    console.error("coast.html drawData error:", err);
  }
}

// ── postMessage router ────────────────────────────────────────────────────────
window.addEventListener("message", function(e) {
  if (!e.data) return;

  if (e.data.type === "coast_init") {
    if (e.data.key && !map) initMap(e.data.key);
    if (e.data.data && map) setTimeout(function() { drawData(e.data.data); }, 400);
    return;
  }

  if (e.data.type === "coast_data") {
    if (!map && e.data.key) {
      initMap(e.data.key);
      if (e.data.data) setTimeout(function() { drawData(e.data.data); }, 800);
    } else if (map && e.data.data) {
      drawData(e.data.data);
    }
    return;
  }
});
</script>
</body>
</html>
